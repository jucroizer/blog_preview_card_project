<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
  </head>
  <body>
    <main class="page">
        <article class="card">
            <figure class="card-thumbnail">
                <img src="images/Blog Image.svg" alt="Blog Preview Image"/>
            </figure>
            <div class="card-content">
                <div class="card-tag">Learning</div>
                <p class="card-date">Published 21 Dec 2023</p>
                <h2 class="card-title">HTML & CSS foundations</h2>
                <p class="card-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
            </div>
            <div class="card-footer">
                <div class="card-author">
                    <img src="images/userpic.svg" alt="Author Image"/>
                    <p class="card-author-name">Greg Hooper</p>
                </div>
            </div>
        </article>
    </main>
  </body>
</html>
